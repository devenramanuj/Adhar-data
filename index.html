<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>આંગણવાડી ડોક્યુમેન્ટ મેનેજર</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FFFBF7 0%, #F5EFEB 100%);
            color: #2d2d2d;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        header h1 {
            font-size: 28px;
            color: #8B6F47;
            margin-bottom: 8px;
            font-weight: 600;
        }

        header p {
            font-size: 14px;
            color: #a08070;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: #D4A574;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #8B6F47;
            transform: translateY(-2px);
        }

        button.active {
            background: #8B6F47;
        }

        button.secondary {
            background: #c4a784;
        }

        button.danger {
            background: #e07856;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .form-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #8B6F47;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e8d7cb;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #5a4d44;
            font-size: 14px;
        }

        input[type="text"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e8d7cb;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="date"]:focus {
            outline: none;
            border-color: #D4A574;
            background: #fffaf7;
        }

        input[type="file"] {
            display: none;
        }

        .file-upload-btn {
            background: #E8B4A0;
            color: #2d2d2d;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            display: inline-block;
            font-size: 13px;
            font-weight: 600;
        }

        .file-name {
            font-size: 12px;
            color: #8B6F47;
            margin-top: 5px;
        }

        .photos-preview {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .photo-item {
            position: relative;
            width: 120px;
            height: 120px;
            background: #f0e8e0;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #e8d7cb;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-label {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px;
            font-size: 11px;
            text-align: center;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border-left: 5px solid #D4A574;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #8B6F47;
            margin-bottom: 10px;
        }

        .card-subtitle {
            font-size: 13px;
            color: #a08070;
            margin-bottom: 15px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .button-group button {
            flex: 1;
        }

        .message {
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .message.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .message.show {
            display: block;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: #D4A574;
        }

        .stat-label {
            font-size: 12px;
            color: #a08070;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 10px;
            max-width: 90%;
            max-height: 90vh;
            overflow: auto;
            padding: 20px;
        }

        .modal-close {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #a08070;
        }

        .modal img {
            width: 100%;
            max-width: 500px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #a08070;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 22px;
            }

            .card-info {
                grid-template-columns: 1fr;
            }

            .nav-buttons {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>આંગણવાડી ડોક્યુમેન્ટ મેનેજર</h1>
            <p>સરળ અને સુરક્ષિત સંગ્રહ સમાધાન</p>
        </header>

        <div class="nav-buttons">
            <button onclick="showPage('add')" class="active">+ ઈન્ટ્રી ઉમેરો</button>
            <button onclick="showPage('search')">🔍 શોધો</button>
        </div>

        <!-- ADD PAGE -->
        <div id="add-page" class="page active">
            <div id="messageAdd" class="message"></div>

            <div class="form-section">
                <div class="section-title">વાલી અને બાળક માહિતી</div>
                
                <div class="form-group">
                    <label>વાલીનું નામ *</label>
                    <input type="text" id="waliName" placeholder="વાલીનું નામ લખો">
                </div>

                <div class="form-group">
                    <label>બાળકનું નામ *</label>
                    <input type="text" id="childName" placeholder="બાળકનું નામ લખો">
                </div>
            </div>

            <div class="form-section">
                <div class="section-title">ફોટો અપલોડ કરો</div>

                <div class="form-group">
                    <label>આધાર ઝેરોક્સ</label>
                    <div class="file-upload-btn" onclick="document.getElementById('aadharPhoto').click()">
                        📷 આધાર ફોટો આપલોડ કરો
                    </div>
                    <input type="file" id="aadharPhoto" accept="image/*">
                    <div class="file-name" id="aadharPhotoName"></div>
                </div>

                <div class="form-group">
                    <label>જન્મ પ્રમાણપત્ર ઝેરોક્સ</label>
                    <div class="file-upload-btn" onclick="document.getElementById('birthCertPhoto').click()">
                        📷 જન્મ પ્રમાણપત્ર ફોટો આપલોડ કરો
                    </div>
                    <input type="file" id="birthCertPhoto" accept="image/*">
                    <div class="file-name" id="birthCertPhotoName"></div>
                </div>

                <div class="photos-preview" id="photosPreview"></div>
            </div>

            <div class="button-group">
                <button onclick="saveEntry()">✓ સેવ કરો</button>
                <button onclick="clearForm()" class="secondary">Clear</button>
            </div>
        </div>

        <!-- SEARCH PAGE -->
        <div id="search-page" class="page">
            <div class="form-section">
                <input 
                    type="text" 
                    id="searchInput" 
                    style="width: 100%; padding: 12px;"
                    placeholder="વાલી અથવા બાળક નું નામ શોધો..."
                    onkeyup="searchRecords()">
            </div>

            <div class="stats">
                <div class="stat-box">
                    <div class="stat-number" id="totalRecords">0</div>
                    <div class="stat-label">કુલ ઈન્ટ્રી</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="totalWalis">0</div>
                    <div class="stat-label">વાલીઓ</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="totalChildren">0</div>
                    <div class="stat-label">બાળકો</div>
                </div>
            </div>

            <div id="searchResults"></div>
        </div>
    </div>

    <!-- Photo Modal -->
    <div id="photoModal" class="modal" onclick="closePhotoModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closePhotoModal()">×</span>
            <img id="modalPhoto" src="" alt="">
        </div>
    </div>

    <script>
        // Database
        let allRecords = [];
        loadRecords();
        updateStats();

        // File upload handlers
        document.getElementById('aadharPhoto').addEventListener('change', function(e) {
            handleFileSelect(e, 'aadhar', 'aadharPhotoName');
        });

        document.getElementById('birthCertPhoto').addEventListener('change', function(e) {
            handleFileSelect(e, 'birth', 'birthCertPhotoName');
        });

        function handleFileSelect(e, type, nameElementId) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById(nameElementId).textContent = '✓ ' + file.name;
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    displayPhotoPreview(event.target.result, type);
                };
                reader.readAsDataURL(file);
            }
        }

        function displayPhotoPreview(dataUrl, type) {
            let container = document.getElementById('photosPreview');
            let existing = container.querySelector(`[data-type="${type}"]`);
            
            if (existing) {
                existing.remove();
            }

            const photoDiv = document.createElement('div');
            photoDiv.className = 'photo-item';
            photoDiv.dataset.type = type;
            photoDiv.innerHTML = `
                <img src="${dataUrl}">
                <div class="photo-label">${type === 'aadhar' ? 'આધાર' : 'જ.પ્રમાણપત્ર'}</div>
            `;
            container.appendChild(photoDiv);
            
            window[type + 'PhotoData'] = dataUrl;
        }

        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageName + '-page').classList.add('active');
            
            document.querySelectorAll('.nav-buttons button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            if (pageName === 'search') {
                updateStats();
                searchRecords();
            }
        }

        function saveEntry() {
            const waliName = document.getElementById('waliName').value.trim();
            const childName = document.getElementById('childName').value.trim();

            if (!waliName || !childName) {
                showMessage('messageAdd', 'error', 'કૃપા કરીને વાલી અને બાળક નું નામ ભરો');
                return;
            }

            const record = {
                id: Date.now().toString(),
                waliName: waliName,
                childName: childName,
                aadharPhoto: window.aadharPhotoData || null,
                birthCertPhoto: window.birthPhotoData || null,
                createdAt: new Date().toISOString()
            };

            allRecords.push(record);
            saveRecords();
            
            showMessage('messageAdd', 'success', '✓ ઈન્ટ્રી સફળતાથી સેવ થઈ');
            clearForm();
            updateStats();
        }

        function clearForm() {
            document.getElementById('waliName').value = '';
            document.getElementById('childName').value = '';
            document.getElementById('aadharPhotoName').textContent = '';
            document.getElementById('birthCertPhotoName').textContent = '';
            document.getElementById('photosPreview').innerHTML = '';
            window.aadharPhotoData = null;
            window.birthPhotoData = null;
        }

        function searchRecords() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            let results = allRecords;
            
            if (query) {
                results = allRecords.filter(record => 
                    record.waliName.toLowerCase().includes(query) ||
                    record.childName.toLowerCase().includes(query)
                );
            }

            displayResults(results);
        }

        function displayResults(records) {
            const container = document.getElementById('searchResults');

            if (records.length === 0) {
                container.innerHTML = '<div class="no-results"><p>કોઈ પરિણામ મળ્યાં નહીં</p></div>';
                return;
            }

            container.innerHTML = records.map(record => `
                <div class="card">
                    <div class="card-title">${record.waliName}</div>
                    <div class="card-subtitle">બાળક: ${record.childName}</div>
                    
                    ${record.aadharPhoto || record.birthCertPhoto ? `
                        <div style="display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap;">
                            ${record.aadharPhoto ? `
                                <img src="${record.aadharPhoto}" 
                                     style="width: 100px; height: 100px; border-radius: 6px; cursor: pointer; object-fit: cover;"
                                     onclick="openPhotoModal('${record.aadharPhoto}')"
                                     title="આધાર - ક્લિક કરીને મોટું જોઓ">
                            ` : ''}
                            ${record.birthCertPhoto ? `
                                <img src="${record.birthCertPhoto}" 
                                     style="width: 100px; height: 100px; border-radius: 6px; cursor: pointer; object-fit: cover;"
                                     onclick="openPhotoModal('${record.birthCertPhoto}')"
                                     title="જ.પ્રમાણપત્ર - ક્લિક કરીને મોટું જોઓ">
                            ` : ''}
                        </div>
                    ` : ''}

                    <div style="margin-top: 15px;">
                        <button onclick="deleteRecord('${record.id}')" class="danger" style="width: auto; padding: 6px 12px; font-size: 12px;">🗑️ Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteRecord(id) {
            if (confirm('શું આપ આ ઈન્ટ્રી કાઢી નાખવાનો પોતાશોકો છો?')) {
                allRecords = allRecords.filter(r => r.id !== id);
                saveRecords();
                searchRecords();
                updateStats();
            }
        }

        function openPhotoModal(photoData) {
            document.getElementById('modalPhoto').src = photoData;
            document.getElementById('photoModal').classList.add('active');
        }

        function closePhotoModal(event) {
            if (event && event.target.id !== 'photoModal') return;
            document.getElementById('photoModal').classList.remove('active');
        }

        function updateStats() {
            document.getElementById('totalRecords').textContent = allRecords.length;
            
            const uniqueWalis = new Set(allRecords.map(r => r.waliName)).size;
            document.getElementById('totalWalis').textContent = uniqueWalis;
            
            document.getElementById('totalChildren').textContent = allRecords.length;
        }

        function showMessage(elementId, type, text) {
            const element = document.getElementById(elementId);
            element.className = 'message ' + type + ' show';
            element.textContent = text;

            setTimeout(() => {
                element.classList.remove('show');
            }, 3000);
        }

        // Storage
        function saveRecords() {
            localStorage.setItem('anganwadiRecords', JSON.stringify(allRecords));
        }

        function loadRecords() {
            const data = localStorage.getItem('anganwadiRecords');
            allRecords = data ? JSON.parse(data) : [];
        }
    </script>
</body>
</html>
